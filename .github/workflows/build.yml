name: Flutter Build

env:
  FLUTTER_VERSION: '3.41.2'

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        required: true
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS'
        required: true
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS'
        required: true
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux'
        required: true
        type: boolean
        default: true

jobs:
  build-android:
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
        shell: bash

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APKs with version
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ' | cut -d'+' -f1)
          mkdir -p result
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk result/i_iwara-${APP_VERSION}-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk result/i_iwara-${APP_VERSION}-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk result/i_iwara-${APP_VERSION}-x86_64.apk
          cp build/app/outputs/flutter-apk/app-release.apk result/i_iwara-${APP_VERSION}-universal.apk

      - name: Upload Android Builds
        uses: actions/upload-artifact@v7
        with:
          name: android_builds
          path: result/

  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install httpx

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows with Installer
        env:
          # Authenticode signing is gated on these secrets; unset -> unsigned (no-op).
          # WINDOWS_CERT_BASE64 = base64 of the .pfx (build.py decodes it to a temp file).
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: python windows/build.py

      - name: Prepare Windows Artifacts
        run: |
          mkdir -p result
          mv build/windows/i_iwara-*-windows-setup.exe result/
        shell: bash

      - name: Upload Windows Builds
        uses: actions/upload-artifact@v7
        with:
          name: windows_builds
          path: result/

  build-macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable macOS
        run: flutter config --enable-macos-desktop

      - name: Build macOS
        run: flutter build macos --release

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Import Developer ID certificate
        # No-ops unless a signing cert secret is present. On a clean
        # GitHub-hosted runner the Developer ID identity does not exist until
        # the .p12 is imported into a keychain, so codesign would otherwise fail.
        # (Gated inside the script: the `secrets` context is not allowed in `if:`.)
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_BASE64" ]; then
            echo "No MACOS_CERT_BASE64 configured; skipping certificate import."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT_P12="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERT_BASE64" | base64 --decode > "$CERT_P12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_P12"

      - name: Create branded DMG
        env:
          # Developer ID signing + notarization is gated on these secrets being
          # present; when unset the script ad-hoc signs and skips notarization.
          # Partial config fails the build (see build_dmg.sh) unless
          # ALLOW_UNSIGNED_RELEASE=1.
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash macos/packaging/build_dmg.sh

      - name: Collect macOS artifact
        run: |
          mkdir -p result
          mv build/macos/i_iwara-*-macos.dmg result/

      - name: Upload macOS build
        uses: actions/upload-artifact@v7
        with:
          name: macos-release
          path: result/

  build-ios:
    if: ${{ inputs.build_ios }}
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 16.4
        shell: bash
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            XCODE_APP=/Applications/Xcode_16.4.app
          else
            shopt -s nullglob
            matches=(/Applications/Xcode_16.4*.app)

            if [ ${#matches[@]} -eq 0 ]; then
              echo "Xcode 16.4 is not installed on this runner. Available Xcode apps:"
              ls -1 /Applications/Xcode*.app 2>/dev/null || true
              exit 1
            fi

            XCODE_APP="${matches[0]}"
          fi

          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: false

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA with version
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ' | cut -d'+' -f1)
          mkdir -p result
          cd build/ios/iphoneos

          # --no-codesign leaves the embedded Flutter/plugin frameworks completely
          # unsigned. AltStore/SideStore re-sign on-device with an old `ldid` that
          # aborts on a fully-unsigned inner Mach-O:
          #   ldid.cpp: _assert(): end >= size - 0x10  (ALTSigner.mm:497)
          # Ad-hoc sign every embedded framework (inner-to-outer) then the app shell so
          # each binary gets an LC_CODE_SIGNATURE; the sideloader overwrites these with
          # the real Apple ID signature on install. Use `codesign -s -`, NOT `ldid -S`
          # (which runs the same crashing assert).
          find Runner.app -name _CodeSignature -type d -prune -exec rm -rf {} +
          for f in Runner.app/Frameworks/*; do
            [ -e "$f" ] || continue
            codesign --force --sign - "$f"
          done
          codesign --force --sign - Runner.app

          mkdir Payload
          cp -r Runner.app Payload
          zip -r ../../../result/i_iwara-${APP_VERSION}-ios.ipa Payload

      - name: Upload iOS build
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: result/i_iwara-*-ios.ipa

  build-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev libasound2-dev libmpv-dev mpv libnotify-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Linux
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        run: flutter build linux --release

      - name: Create TAR archive
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ' | cut -d'+' -f1)
          mkdir -p result
          tar -czf result/i_iwara-linux-$APP_VERSION.tar.gz -C build/linux/x64/release bundle

      - name: Upload Linux build
        uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: result/
