# Anime4K 設定
anime4k:
  realTimeVideoUpscalingAndDenoising: "Anime4K 即時影片上採樣和降噪，提升動畫影片品質"
  settings: "Anime4K 設定"
  preset: "Anime4K 預設"
  disable: "關閉 Anime4K"
  disableDescription: "停用影片增強效果"
  highQualityPresets: "高品質預設"
  fastPresets: "快速預設"
  litePresets: "輕量級預設"
  moreLitePresets: "更多輕量級預設"
  customPresets: "自訂預設"
  presetGroups:
    highQuality: "高品質"
    fast: "快速"
    lite: "輕量級"
    moreLite: "更多輕量級"
    custom: "自訂"
  presetDescriptions:
    mode_a_hq: "適用於大多數1080p動漫，特別是處理模糊、重採樣和壓縮瑕疵。提供最高的感知品質。"
    mode_b_hq: "適用於輕微模糊或因縮放產生的振鈴效應的動漫。可以有效減少振鈴和鋸齒。"
    mode_c_hq: "適用於幾乎沒有瑕疵的高品質片源（如原生1080p的動畫電影或桌布）。降噪並提供最高的PSNR。"
    mode_a_a_hq: "Mode A的強化版，提供極致的感知品質，能重建幾乎所有退化的線條。可能產生過度銳化或振鈴。"
    mode_b_b_hq: "Mode B的強化版，提供更高的感知品質，進一步最佳化線條和減少瑕疵。"
    mode_c_a_hq: "Mode C的感知品質增強版，在保持高PSNR的同時嘗試重建一些線條細節。"
    mode_a_fast: "Mode A的快速版本，平衡了品質與性能，適用於大多數1080p動漫。"
    mode_b_fast: "Mode B的快速版本，用於處理輕微瑕疵和振鈴，性能開銷較低。"
    mode_c_fast: "Mode C的快速版本，適用於高品質片源的快速降噪和放大。"
    mode_a_a_fast: "Mode A+A的快速版本，在性能有限的裝置上追求更高的感知品質。"
    mode_b_b_fast: "Mode B+B的快速版本，為性能有限的裝置提供增強的線條修復和瑕疵處理。"
    mode_c_a_fast: "Mode C+A的快速版本，在快速處理高品質片源的同時，進行輕度的線條修復。"
    upscale_only_s: "僅使用最快的CNN模型進行x2放大，無修復和降噪，性能開銷最低。"
    upscale_deblur_fast: "使用快速的非CNN演算法進行放大和去模糊，效果優於傳統演算法，性能開銷很低。"
    restore_s_only: "僅使用最快的CNN模型修復畫面瑕疵，不進行放大。適用於原生解析度播放，但希望改善畫質的情況。"
    denoise_bilateral_fast: "使用傳統的雙邊濾波器進行降噪，速度極快，適用於處理輕微噪點。"
    upscale_non_cnn: "使用快速的傳統演算法進行放大，性能開銷極低，效果優於播放器內建演算法。"
    mode_a_fast_darken: "Mode A (Fast) + 線條加深，在快速模式A的基礎上增加線條加深效果，使線條更突出，風格化處理。"
    mode_a_hq_thin: "Mode A (HQ) + 線條細化，在高品質模式A的基礎上增加線條細化效果，讓畫面看起來更精緻。"
  presetNames:
    mode_a_hq: "Mode A (HQ)"
    mode_b_hq: "Mode B (HQ)"
    mode_c_hq: "Mode C (HQ)"
